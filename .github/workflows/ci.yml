name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync backend dependencies
        run: uv sync --group dev --frozen

      - name: Run backend tests
        run: uv run pytest tests/auth/test_utils.py tests/auth/test_dependencies.py tests/backend/test_api_key_routes.py tests/backend/test_storage_routes.py tests/test_akshare_proxy_safety.py tests/test_tushare_df_cache.py tests/test_data_cache_scripts.py -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
